<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 4</title>
    <style>
      body{
        background-color: rgb(30, 16, 3);
        font-family: monospace;
        color:rgb(225, 137, 55);
        cursor: url(cursor/CrosshairPrecisionBlue.cur) 24 24, auto;
      }

      h1{
            font-size:4em;
            display: flex;
            justify-content: center;
            align-items: center;
        }

      .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            
      }
      .gallery > * {
            flex: 1 1 215px;
            max-width: 323px;
            aspect-ratio: 1;
      }
      .gallery-item {
            position: relative;
            overflow: hidden;
      }
      .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
      }
      .caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7); color: white;
            padding: 0.5rem; 
            transform: translateY(100%);
            transition: 0.3s; 
            font-size: 0.8rem;
      }
      .gallery-item:hover .caption {
            transform: translateY(0);
      }
    </style>
</head>
<body>
  <h1> Week 4 </h1>

  <h2>Class Activity</h2>
<div class="gallery">
  <div class="gallery-item">
    <!---->
    <img src="Images-Ass2/self-portrait-1.png" alt="Self-portrait">
    <div class="caption">Self-portrait</div>
  </div>

  <div class="gallery-item">
    <img src="Images-Ass2/YayoiKusama-1.png" alt="Yayoi Kusama work">
    <div class="caption">My rendition of Yayoi Kusama's work</div>
  </div>

  <!--
  <div class="gallery-item">
    <img src="Images-Ass2/SLAVETOALGO-FAKE.png" alt="Slave to the algorithm">
    <div class="caption">Slave to the Algorithm</div>
  </div>
    -->
</div>
</body>
</html>
